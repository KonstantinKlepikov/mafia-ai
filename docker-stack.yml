name: infra
services:
  mafia-ai-llm:
    build:
      context: /home/kklepikov/_code_/mafia-ai
      dockerfile: infra/llm/Dockerfile
    depends_on:
      mafia-ai-ollama:
        condition: service_healthy
    environment:
      LLM_QUEUE_MAX_SIZE: "10"
      OLLAMA_MODEL: mistral
      OLLAMA_URL: http://mafia-ai-ollama:11434
      SERVICENAME: llm
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:8080/docs
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      game_net: null
    ports:
    - mode: ingress
      target: 8080
      published: "38080"
      protocol: tcp
  mafia-ai-ollama:
    build:
      context: /home/kklepikov/_code_/mafia-ai/infra/ollama
      dockerfile: Dockerfile
    environment:
      OLLAMA_MODEL: mistral
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:11434/api/tags
      timeout: 10s
      interval: 15s
      retries: 10
      start_period: 30s
    networks:
      game_net: null
    ports:
    - mode: ingress
      target: 11434
      published: "31434"
      protocol: tcp
    volumes:
    - type: volume
      source: ollama_data
      target: /root/.ollama
      volume: {}
  mafia-ai-otel-collector:
    command:
    - --config=/etc/otel-collector-config.yaml
    image: otel/opentelemetry-collector-contrib:0.111.0
    networks:
      game_net: null
    volumes:
    - type: bind
      source: /home/kklepikov/_code_/mafia-ai/infra/vectordb/otel-collector-config.yaml
      target: /etc/otel-collector-config.yaml
      bind:
        create_host_path: true
  mafia-ai-rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_USER: guest
    healthcheck:
      test:
      - CMD
      - rabbitmq-diagnostics
      - ping
      timeout: 5s
      interval: 10s
      retries: 5
    image: rabbitmq:3.13-management-alpine
    networks:
      game_net: null
    ports:
    - mode: ingress
      target: 5672
      published: "35672"
      protocol: tcp
    - mode: ingress
      target: 15672
      published: "35673"
      protocol: tcp
  mafia-ai-vectordb:
    depends_on:
      mafia-ai-otel-collector:
        condition: service_started
      mafia-ai-zipkin:
        condition: service_started
    environment:
      CHROMA_OPEN_TELEMETRY__ENDPOINT: http://mafia-ai-otel-collector:4317/
      CHROMA_OPEN_TELEMETRY__SERVICE_NAME: chroma
    image: chromadb/chroma
    networks:
      game_net: null
    ports:
    - mode: ingress
      target: 8000
      published: "36333"
      protocol: tcp
    volumes:
    - type: volume
      source: chroma_data
      target: /data
      volume: {}
  mafia-ai-vectordb-seed:
    build:
      context: /home/kklepikov/_code_/mafia-ai
      dockerfile: infra/vectordb/Dockerfile
    depends_on:
      mafia-ai-vectordb:
        condition: service_started
    networks:
      game_net: null
    restart: "no"
  mafia-ai-zipkin:
    depends_on:
      mafia-ai-otel-collector:
        condition: service_started
    image: openzipkin/zipkin
    networks:
      game_net: null
    ports:
    - mode: ingress
      target: 9411
      published: "29411"
      protocol: tcp
networks:
  game_net:
    name: infra_game_net
    driver: bridge
volumes:
  chroma_data:
    name: infra_chroma_data
  ollama_data:
    name: infra_ollama_data
