services:
  mafia-ai-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "35672:5672"
      - "35673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    networks:
      - game_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mafia-ai-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ${PWD}/infra/vectordb/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - game_net

  mafia-ai-zipkin:
    image: openzipkin/zipkin
    ports:
      - "29411:9411"
    depends_on: [mafia-ai-otel-collector]
    networks:
      - game_net

  mafia-ai-vectordb:
    image: chromadb/chroma
    volumes:
      - chroma_data:/data
    ports:
      - "36333:8000"
    networks:
      - game_net
    environment:
      - CHROMA_OPEN_TELEMETRY__ENDPOINT=http://mafia-ai-otel-collector:4317/
      - CHROMA_OPEN_TELEMETRY__SERVICE_NAME=chroma
    depends_on:
      - mafia-ai-otel-collector
      - mafia-ai-zipkin
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
    #   interval: 15s
    #   timeout: 5s
    #   retries: 3

  mafia-ai-ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    ports:
      - "31434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
    networks:
      - game_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mafia-ai-llm:
    build:
      context: ..
      dockerfile: infra/llm/Dockerfile
    ports:
      - "38080:8080"
    environment:
      OLLAMA_URL: http://mafia-ai-ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      LLM_QUEUE_MAX_SIZE: ${LLM_QUEUE_MAX_SIZE:-10}
      SERVICENAME: llm
    depends_on:
      mafia-ai-ollama:
        condition: service_healthy
    networks:
      - game_net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mafia-ai-vectordb-seed:
    build:
      context: ..
      dockerfile: infra/vectordb/Dockerfile
    depends_on:
      mafia-ai-vectordb:
        condition: service_started
    networks:
      - game_net
    restart: "no"

networks:
  game_net:
    driver: bridge

volumes:
  ollama_data:
  chroma_data:
